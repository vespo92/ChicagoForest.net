apiVersion: apps/v1
kind: Deployment
metadata:
  name: forest-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forest-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forest-control-plane
        app.kubernetes.io/part-of: chicago-forest
    spec:
      containers:
        - name: forest-cp
          image: forest-control-plane:latest
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: forest-cp-config
          env:
            - name: HEADSCALE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: forest-cp-secrets
                  key: headscale-api-key
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forest-cp-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forest-cp-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
